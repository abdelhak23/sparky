<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 Not Found</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0b0a10;--card:#171625;--border:rgba(255,255,255,.08);--text:#f0ecff;--muted:#8581aa;--accent:#ff4e6a;--accent2:#ff8c42}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif}
body{display:flex;align-items:center;justify-content:center;padding:24px}
.box{width:100%;max-width:520px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:32px}
.code{font-family:'Playfair Display',serif;font-size:4rem;line-height:1;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:12px}
h1{font-family:'Playfair Display',serif;font-size:1.5rem;margin-bottom:8px}
p{color:var(--muted);line-height:1.7;font-size:.95rem}
a{display:inline-flex;margin-top:22px;color:#fff;background:var(--accent);border-radius:10px;padding:10px 14px;text-decoration:none;font-size:.88rem}
</style>
</head>
<body>
  <main class="box">
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>The page you requested does not exist or is not available.</p>
    <a href="/strangerdate.html">Go home</a>
  </main>
</body>
</html>
