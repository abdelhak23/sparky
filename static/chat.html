<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spark — Messages</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0a10;--surface:#13121c;--card:#1a1827;--panel:#12121f;
  --accent1:#ff4e6a;--accent2:#ff8c42;--accent3:#c77dff;
  --gold:#f5c842;--teal:#48c7be;
  --text:#f0ecff;--muted:#7b78a0;
  --border:rgba(255,255,255,0.08);--glow1:rgba(255,78,106,0.35);
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");background-size:200px;pointer-events:none;z-index:1000;opacity:.4}

/* NAV */
nav{height:58px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 28px;background:rgba(11,10,16,.97);border-bottom:1px solid var(--border);backdrop-filter:blur(12px);z-index:200;gap:12px}
.nav-logo{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:900;background:linear-gradient(135deg,var(--accent1),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none}
.nav-links{display:flex;gap:6px;align-items:center}
.nav-link{display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:10px;text-decoration:none;color:var(--muted);font-size:.82rem;transition:background .2s,color .2s}
.nav-link:hover,.nav-link.active{background:rgba(255,255,255,.06);color:var(--text)}
.nav-link svg{width:15px;height:15px}
.nav-link .badge{background:var(--accent1);color:#fff;font-size:.6rem;font-weight:700;padding:1px 5px;border-radius:50px;margin-left:2px}
.token-pill{display:flex;align-items:center;gap:6px;background:rgba(245,200,66,.1);border:1px solid rgba(245,200,66,.25);color:var(--gold);font-size:.78rem;font-weight:600;padding:5px 12px;border-radius:50px;text-decoration:none;transition:background .2s}
.token-pill:hover{background:rgba(245,200,66,.18)}
.token-pill svg{width:13px;height:13px}

/* LAYOUT — full height minus nav */
.app{display:flex;height:calc(100vh - 58px)}

/* ── LEFT SIDEBAR — conversation list ── */
.sidebar{width:300px;flex-shrink:0;display:flex;flex-direction:column;border-right:1px solid var(--border);background:var(--panel)}
.sb-header{padding:18px 18px 12px;flex-shrink:0}
.sb-title{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;margin-bottom:12px}
.sb-search{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:10px;padding:9px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.85rem;outline:none;transition:border-color .2s}
.sb-search:focus{border-color:var(--accent1)}
.sb-search::placeholder{color:#4a4870}
.conv-list{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.08) transparent}
.conv-item{display:flex;align-items:center;gap:12px;padding:12px 18px;cursor:pointer;transition:background .15s;border-bottom:1px solid rgba(255,255,255,.03);position:relative}
.conv-item:hover{background:rgba(255,255,255,.04)}
.conv-item.active{background:rgba(255,78,106,.08);border-right:2px solid var(--accent1)}
.conv-avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,rgba(255,78,106,.25),rgba(199,125,255,.25));display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:rgba(255,255,255,.85);flex-shrink:0;position:relative}
.conv-online{position:absolute;bottom:1px;right:1px;width:10px;height:10px;border-radius:50%;background:var(--teal);border:2px solid var(--panel)}
.conv-info{flex:1;min-width:0}
.conv-name{font-size:.88rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv-preview{font-size:.75rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.conv-time{font-size:.68rem;color:var(--muted);flex-shrink:0}
.conv-unread{position:absolute;top:12px;right:14px;width:18px;height:18px;border-radius:50%;background:var(--accent1);color:#fff;font-size:.62rem;font-weight:700;display:flex;align-items:center;justify-content:center}
.empty-sb{text-align:center;padding:40px 16px;color:var(--muted);font-size:.85rem}
.empty-sb svg{width:36px;height:36px;margin:0 auto 12px;display:block;opacity:.25}

/* Hide browser-injected icons in inputs */
input::-webkit-contacts-auto-fill-button,
input::-webkit-credentials-auto-fill-button,
input::-webkit-search-cancel-button,
input::-webkit-search-decoration,
input::-ms-clear,
input::-ms-reveal {
  display: none !important;
}

/* ── MAIN CHAT AREA ── */
.chat-main{flex:1;display:flex;flex-direction:column;min-width:0}

/* No conversation selected */
.no-conv{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:var(--muted)}
.no-conv svg{width:56px;height:56px;opacity:.2}
.no-conv h3{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--text)}
.no-conv p{font-size:.88rem;text-align:center;max-width:280px;line-height:1.7}
.no-conv a{color:var(--accent1);text-decoration:none}
.no-conv a:hover{text-decoration:underline}

/* Chat header */
.chat-header{height:60px;flex-shrink:0;display:flex;align-items:center;gap:14px;padding:0 24px;border-bottom:1px solid var(--border);background:rgba(11,10,16,.6);backdrop-filter:blur(8px)}
.ch-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,rgba(255,78,106,.25),rgba(199,125,255,.25));display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:.9rem;font-weight:700;color:rgba(255,255,255,.85);flex-shrink:0;position:relative}
.ch-online{position:absolute;bottom:0;right:0;width:9px;height:9px;border-radius:50%;background:var(--teal);border:2px solid var(--bg)}
.ch-name{font-weight:500;font-size:.95rem}
.ch-status{font-size:.75rem;color:var(--muted);margin-top:1px}
.ch-actions{margin-left:auto;display:flex;gap:8px}
.icon-btn{width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .2s,color .2s;text-decoration:none}
.icon-btn:hover{background:rgba(255,255,255,.1);color:var(--text)}
.icon-btn svg{width:15px;height:15px}

/* Messages area */
.messages-area{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:12px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.08) transparent}
.msg-row{display:flex;align-items:flex-end;gap:8px}
.msg-row.mine{flex-direction:row-reverse}
.msg-avatar{width:28px;height:28px;border-radius:50%;background:rgba(199,125,255,.2);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:.65rem;font-weight:700;flex-shrink:0;margin-bottom:4px}
.msg-content{display:flex;flex-direction:column;max-width:70%;min-width:0}
.bubble{width:fit-content;padding:10px 14px;border-radius:18px;font-size:.9rem;line-height:1.55;overflow-wrap:break-word;animation:msgIn .2s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.bubble.theirs{background:rgba(255,255,255,.07);border-radius:4px 18px 18px 18px}
.bubble.mine{background:var(--accent1);border-radius:18px 4px 18px 18px;color:#fff}
.bubble.photo{padding:4px;background:rgba(255,255,255,.07);overflow:hidden}
.bubble.photo.mine{background:var(--accent1)}
.photo-msg{display:block;max-width:min(300px,60vw);max-height:340px;border-radius:14px;object-fit:cover}
.bubble-time{font-size:.62rem;color:rgba(255,255,255,.3);margin-top:4px;text-align:right}
.bubble.theirs .bubble-time{color:var(--muted);text-align:left}
.system-line{text-align:center;font-size:.72rem;color:var(--muted);padding:4px 0}
.typing-bubble{display:flex;align-items:center;gap:4px;padding:10px 14px;background:rgba(255,255,255,.07);border-radius:4px 18px 18px 18px;width:fit-content}
.typing-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:typingBounce .9s ease-in-out infinite}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes typingBounce{0%,100%{transform:translateY(0);opacity:.4}50%{transform:translateY(-5px);opacity:1}}

/* Date separator */
.date-sep{display:flex;align-items:center;gap:10px;margin:8px 0;color:var(--muted);font-size:.72px}
.date-sep::before,.date-sep::after{content:'';flex:1;height:1px;background:var(--border)}
.date-sep span{font-size:.72rem;white-space:nowrap}

/* Input area */
.input-area{flex-shrink:0;padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:10px;align-items:flex-end;background:rgba(11,10,16,.6);backdrop-filter:blur(8px)}
.msg-input{flex:1;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:14px;padding:11px 16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none;resize:none;max-height:120px;min-height:44px;transition:border-color .2s;scrollbar-width:thin;line-height:1.5}
.msg-input:focus{border-color:rgba(255,78,106,.4)}
.msg-input::placeholder{color:#4a4870}
.attach-btn{width:44px;height:44px;border-radius:12px;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:background .2s,color .2s}
.attach-btn:hover{background:rgba(255,255,255,.1);color:var(--text)}
.attach-btn svg{width:17px;height:17px}
.attach-btn:disabled{opacity:.45;cursor:default}
.send-btn{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--accent1),var(--accent2));border:none;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 16px var(--glow1)}
.send-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px var(--glow1)}
.send-btn svg{width:17px;height:17px}
.send-btn:disabled{opacity:.4;cursor:default;transform:none}

/* Empty messages */
.empty-chat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--muted)}
.empty-chat svg{width:44px;height:44px;opacity:.2}
.empty-chat p{font-size:.88rem}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(8,7,16,.92);border:1px solid var(--border);border-radius:50px;padding:9px 22px;font-size:.85rem;color:var(--text);opacity:0;pointer-events:none;transition:opacity .3s;z-index:999;white-space:nowrap}
.toast.show{opacity:1}

@media(max-width:768px){
  .sidebar{width:72px}
  .sb-header,.conv-info,.conv-time,.sb-search{display:none}
  .conv-item{justify-content:center;padding:10px}
  .nav-links .nav-link span{display:none}
  nav{padding:0 12px}
}
</style>
</head>

<script>
if (!SparkAPI.isLoggedIn()) window.location.href = '/login.html';

const H = { 'Authorization': 'Bearer ' + SparkAPI.getToken(), 'Content-Type': 'application/json' };
let _myId = null, _myInitials = '?';
let _myAvatar = null;
let _friends = [];          // [{friend:{id,first_name,last_name}, ...}]
let _activeId = null;       // currently open friend id
let _onlineIds = new Set();
let _typingTimer = null;
let _filtered = [];

// ── Socket ────────────────────────────────────────────────────────────────────
const socket = SparkAPI.connectSocket();

socket.on('connected', d => {
  if (d.authenticated) {
    _myId = d.user_id || _myId;
    document.getElementById('tokenCount').textContent = d.tokens;
  }
});

socket.on('dm_received', msg => {
  // Show typing gone
  hideTyping();

  // Update sidebar preview
  const friend = _friends.find(f => f.friend.id === msg.sender_id);
  if (friend) {
    friend._lastMsg     = previewText(msg);
    friend._lastTime    = msg.created_at;
    friend._unread      = (friend._unread || 0) + 1;
    renderSidebar();
  }
  // If this conversation is open, append the message
  if (_activeId === msg.sender_id) {
    appendMessage(msg, false);
    scrollBottom();
    if (friend) friend._unread = 0;
    renderSidebar();
    // Mark read via API
    fetch(`/api/friends/dm/${msg.sender_id}`, { headers: H }).catch(() => {});
  }
});

socket.on('dm_sent', msg => {
  // Already appended optimistically; update sidebar
  const friend = _friends.find(f => f.friend.id === msg.receiver_id);
  if (friend) { friend._lastMsg = previewText(msg); friend._lastTime = msg.created_at; }
  renderSidebar();
});

socket.on('dm_typing', d => {
  if (d.from_user_id === _activeId) showTyping();
});

socket.on('friends_online', d => {
  _onlineIds = new Set(d.online_ids);
  renderSidebar();
  if (_activeId) updateChatHeader();
});

// ── Load ──────────────────────────────────────────────────────────────────────
async function init() {
  try {
    const [meRes, friendsRes] = await Promise.all([
      SparkAPI.me(),
      fetch('/api/friends/', { headers: H }).then(r => r.json()),
    ]);

    _myId       = meRes.user.id;
    _myInitials = (meRes.user.first_name[0] + (meRes.user.last_name?.[0] || '')).toUpperCase();
    _myAvatar   = meRes.user.avatar_url;
    document.getElementById('tokenCount').textContent = meRes.user.tokens;
    document.getElementById('typingAvatar').innerHTML = _myAvatar ? `<img src="${_myAvatar}" style="width:100%;height:100%;border-radius:50%;object-fit:cover">` : _myInitials;

    _friends = friendsRes.friends || [];
    _filtered = [..._friends];

    // Fetch last message preview for each friend
    await Promise.all(_friends.map(async f => {
      try {
        const res = await fetch(`/api/friends/dm/${f.friend.id}?per_page=1`, { headers: H });
        const d   = await res.json();
        if (d.messages?.length) {
          f._lastMsg  = previewText(d.messages[d.messages.length - 1]);
          f._lastTime = d.messages[d.messages.length - 1].created_at;
        }
        f._unread = 0;
      } catch (_) {}
    }));

    renderSidebar();

    // Check online status
    if (_friends.length) {
      socket.emit('friend_online_check', { friend_ids: _friends.map(f => f.friend.id) });
    }

    // Auto-open from URL param ?with=userId
    const params = new URLSearchParams(window.location.search);
    const withId = parseInt(params.get('with'));
    if (withId) openConversation(withId);

  } catch (e) { showToast('Failed to load messages.'); }
}

// ── Sidebar ───────────────────────────────────────────────────────────────────
function renderSidebar() {
  const el = document.getElementById('convList');
  if (!_filtered.length) {
    el.innerHTML = `<div class="empty-sb">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      No conversations yet.<br>Add friends first.
    </div>`;
    return;
  }

  el.innerHTML = _filtered.map(f => {
    const online   = _onlineIds.has(f.friend.id);
    const initials = (f.friend.first_name[0] + (f.friend.last_name?.[0] || '')).toUpperCase();
    const avHtml   = f.friend.avatar_url ? `<img src="${f.friend.avatar_url}" style="width:100%;height:100%;border-radius:50%;object-fit:cover">` : initials;
    const active   = f.friend.id === _activeId ? ' active' : '';
    const time     = f._lastTime ? formatTime(f._lastTime) : '';
    const preview  = f._lastMsg ? escHtml(f._lastMsg).substring(0, 36) + (f._lastMsg.length > 36 ? '…' : '') : 'No messages yet';
    const unread   = f._unread > 0 ? `<div class="conv-unread">${f._unread}</div>` : '';
    return `<div class="conv-item${active}" onclick="openConversation(${f.friend.id})">
      <div class="conv-avatar" style="overflow:hidden">${avHtml}${online ? '<span class="conv-online"></span>' : ''}</div>
      <div class="conv-info">
        <div class="conv-name">${escHtml(f.friend.first_name)} ${escHtml(f.friend.last_name || '')}</div>
        <div class="conv-preview">${preview}</div>
      </div>
      <div class="conv-time">${time}</div>
      ${unread}
    </div>`;
  }).join('');
}

// ── Open conversation ─────────────────────────────────────────────────────────
async function openConversation(friendId) {
  _activeId = friendId;
  const friend = _friends.find(f => f.friend.id === friendId);
  if (!friend) return;

  friend._unread = 0;
  renderSidebar();
  updateChatHeader(friend);

  document.getElementById('noConv').style.display   = 'none';
  const cv = document.getElementById('convView');
  cv.style.display = 'flex';

  // Load messages
  const area = document.getElementById('messagesArea');
  area.innerHTML = '<div class="system-line">Loading…</div>';

  try {
    const res  = await fetch(`/api/friends/dm/${friendId}?per_page=60`, { headers: H });
    const data = await res.json();
    area.innerHTML = '';

    if (!data.messages?.length) {
      area.innerHTML = `<div class="empty-chat" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--muted)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:44px;height:44px;opacity:.2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        <p style="font-size:.88rem">No messages yet — say hi! 👋</p>
      </div>`;
      return;
    }

    let lastDate = '';
    data.messages.forEach(msg => {
      const d = new Date(msg.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      if (d !== lastDate) {
        lastDate = d;
        const sep = document.createElement('div');
        sep.className = 'date-sep'; sep.innerHTML = `<span>${d}</span>`;
        area.appendChild(sep);
      }
      appendMessage(msg, false);
    });
    scrollBottom();
  } catch (e) {
    area.innerHTML = '<div class="system-line">Failed to load messages.</div>';
  }
}

function updateChatHeader(friend) {
  if (!friend) friend = _friends.find(f => f.friend.id === _activeId);
  if (!friend) return;
  const online   = _onlineIds.has(friend.friend.id);
  const initials = (friend.friend.first_name[0] + (friend.friend.last_name?.[0] || '')).toUpperCase();
  const avHtml   = friend.friend.avatar_url ? `<img src="${friend.friend.avatar_url}" style="width:100%;height:100%;border-radius:50%;object-fit:cover">` : initials;
  document.getElementById('chAvatar').innerHTML = avHtml + `<span class="ch-online" id="chOnlineDot" style="display:${online ? 'block' : 'none'}"></span>`;
  document.getElementById('chName').textContent   = `${friend.friend.first_name} ${friend.friend.last_name || ''}`;
  document.getElementById('chStatus').textContent = online ? '🟢 Online' : 'Offline';
  document.getElementById('chOnlineDot').style.display = online ? 'block' : 'none';
  document.getElementById('videoCallBtn').href = '/videochat.html';
}

// ── Append message ────────────────────────────────────────────────────────────
function appendMessage(msg, scroll = true) {
  const area  = document.getElementById('messagesArea');
  const isMine = msg.sender_id === _myId;
  const time   = new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  let avHtml = isMine ? _myInitials : '?';
  if (isMine && _myAvatar) {
    avHtml = `<img src="${_myAvatar}" style="width:100%;height:100%;border-radius:50%;object-fit:cover">`;
  } else if (!isMine) {
    const friend = _friends.find(f => f.friend.id === msg.sender_id);
    if (friend && friend.friend.avatar_url) {
      avHtml = `<img src="${friend.friend.avatar_url}" style="width:100%;height:100%;border-radius:50%;object-fit:cover">`;
    } else if (friend) {
      avHtml = (friend.friend.first_name[0] + (friend.friend.last_name?.[0] || '')).toUpperCase();
    }
  }

  // Remove empty-chat placeholder if present
  const empty = area.querySelector('.empty-chat');
  if (empty) empty.remove();

  const row = document.createElement('div');
  row.className = `msg-row ${isMine ? 'mine' : ''}`;
  const isPhoto = msg.msg_type === 'image';
  const bubbleHtml = isPhoto
    ? `<div class="bubble photo ${isMine ? 'mine' : 'theirs'}"><a href="${escHtml(msg.content)}" target="_blank" rel="noopener"><img class="photo-msg" src="${escHtml(msg.content)}" alt="Shared photo"></a><div class="bubble-time">${time}</div></div>`
    : `<div class="bubble ${isMine ? 'mine' : 'theirs'}">${escHtml(msg.content)}<div class="bubble-time">${time}</div></div>`;
  row.innerHTML = `
    <div class="msg-avatar" style="background:${isMine ? 'rgba(255,78,106,.2)' : 'rgba(199,125,255,.2)'};overflow:hidden;">${avHtml}</div>
    <div class="msg-content" style="align-items:${isMine ? 'flex-end' : 'flex-start'}">
      ${bubbleHtml}
    </div>`;
  area.appendChild(row);
  if (scroll) scrollBottom();
}

// ── Send message ──────────────────────────────────────────────────────────────
async function sendMessage() {
  const inp  = document.getElementById('msgInput');
  const text = inp.value.trim();
  if (!text || !_activeId) return;

  // Optimistic UI
  const now = new Date().toISOString();
  appendMessage({ sender_id: _myId, receiver_id: _activeId, content: text, msg_type: 'text', created_at: now }, true);
  inp.value = ''; inp.style.height = '44px';
  document.getElementById('sendBtn').disabled = true;

  socket.emit('dm_send', { to_user_id: _activeId, content: text, type: 'text' });

  setTimeout(() => { document.getElementById('sendBtn').disabled = false; }, 300);
}

document.getElementById('sendBtn').addEventListener('click', sendMessage);
document.getElementById('photoBtn').addEventListener('click', () => {
  if (!_activeId) return;
  document.getElementById('photoInput').click();
});
document.getElementById('photoInput').addEventListener('change', sendPhoto);
document.getElementById('msgInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

async function sendPhoto() {
  const input = document.getElementById('photoInput');
  const file = input.files?.[0];
  if (!file || !_activeId) return;
  if (!file.type.startsWith('image/')) { showToast('Please choose an image file.'); input.value = ''; return; }
  if (file.size > 5 * 1024 * 1024) { showToast('Photo must be 5MB or smaller.'); input.value = ''; return; }

  const btn = document.getElementById('photoBtn');
  btn.disabled = true;
  try {
    const form = new FormData();
    form.append('photo', file);
    const res = await fetch('/api/friends/dm/photo', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + SparkAPI.getToken() },
      body: form,
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || 'Photo upload failed.');

    const now = new Date().toISOString();
    const msg = { sender_id: _myId, receiver_id: _activeId, content: data.url, msg_type: 'image', created_at: now };
    appendMessage(msg, true);
    socket.emit('dm_send', { to_user_id: _activeId, content: data.url, type: 'image' });
  } catch (e) {
    showToast(e.message || 'Photo upload failed.');
  } finally {
    input.value = '';
    btn.disabled = false;
  }
}
document.getElementById('msgInput').addEventListener('input', function () {
  this.style.height = '44px';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  // Typing indicator
  if (_activeId) {
    socket.emit('dm_typing', { to_user_id: _activeId });
    clearTimeout(_typingTimer);
  }
});

// ── Sidebar search ────────────────────────────────────────────────────────────
document.getElementById('sbSearch').addEventListener('input', function () {
  const q = this.value.toLowerCase();
  _filtered = q
    ? _friends.filter(f =>
        (f.friend.first_name + ' ' + (f.friend.last_name || '')).toLowerCase().includes(q)
      )
    : [..._friends];
  renderSidebar();
});

// ── Typing indicator ──────────────────────────────────────────────────────────
function showTyping() {
  document.getElementById('typingRow').style.display = 'flex';
  scrollBottom();
  clearTimeout(_typingTimer);
  _typingTimer = setTimeout(hideTyping, 3000);
}
function hideTyping() {
  document.getElementById('typingRow').style.display = 'none';
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function scrollBottom() {
  const a = document.getElementById('messagesArea');
  a.scrollTop = a.scrollHeight;
}

function formatTime(iso) {
  const d   = new Date(iso);
  const now = new Date();
  const diff = (now - d) / 1000;
  if (diff < 60)     return 'now';
  if (diff < 3600)   return Math.floor(diff / 60) + 'm';
  if (diff < 86400)  return Math.floor(diff / 3600) + 'h';
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function escHtml(str) {
  str = String(str || '');
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
            .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

function previewText(msg) {
  return msg?.msg_type === 'image' ? 'Photo' : (msg?.content || '');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

init();
</script>
